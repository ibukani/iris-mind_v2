schema_version = 2
id = "iris-mind"
display_name = "Iris Mind V2"
kind = "server"
runtime_backend = "host"
toolchain = "python"

[setup]
required_tools = ["uv", "python"]
check_files = ["pyproject.toml", "iris/runtime/server.py", ".iris/config/llm.example.toml"]

[launch]
cwd = "."
command = "uv"
args = [
  "run",
  "python",
  "-m",
  "iris.runtime.server",
  "--config",
  ".iris/config/llm.toml",
  "--host",
  "127.0.0.1",
  "--port",
  "50051",
]

[health]
type = "tcp"
host = "127.0.0.1"
port = 50051
timeout_ms = 3000
interval_ms = 1000
startup_timeout_ms = 30000

[logs]
stdout = true
stderr = true

[commands.quick_check]
cwd = "."
command = "make"
args = ["quick"]

[commands.full_check]
cwd = "."
command = "make"
args = ["check"]

[[config_templates]]
target = ".iris/config/llm.toml"
source = ".iris/config/llm.example.toml"
method = "copy"
overwrite = false

[[editable_configs]]
id = "llm"
label = "LLM Runtime Config"
path = ".iris/config/llm.toml"
template = ".iris/config/llm.example.toml"
format = "toml"
schema = "iris-mind.runtime.v1"
restart_required = true
secret_policy = "warn"
