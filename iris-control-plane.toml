schema_version = 2
id = "iris-mind"
display_name = "Iris Mind V2"
kind = "server"
runtime_backend = "host"
toolchain = "python"

[setup]
required_tools = ["uv", "python"]
check_files = ["pyproject.toml", "iris/runtime/server.py", "iris/runtime/config_provider.py"]

[launch]
cwd = "."
command = "uv"
args = [
  "run",
  "python",
  "-m",
  "iris.runtime.server",
  "--config",
  ".iris/config/runtime.toml",
  "--host",
  "127.0.0.1",
  "--port",
  "50051",
]

[health]
type = "tcp"
host = "127.0.0.1"
port = 50051
timeout_ms = 3000
interval_ms = 1000
startup_timeout_ms = 30000

[logs]
stdout = true
stderr = true

[commands.quick_check]
cwd = "."
command = "make"
args = ["quick"]

[commands.full_check]
cwd = "."
command = "make"
args = ["check"]

[[editable_configs]]
id = "runtime"
label = "Runtime Config"
path = ".iris/config/runtime.toml"
template_provider = { command = "uv", args = ["run", "python", "-m", "iris.runtime.config_provider", "template", "--config-id", "runtime"] }
format = "toml"
schema = "iris-mind.runtime.v2"
schema_manifest = ".iris/control-plane/runtime-config.schema.json"
restart_required = true
secret_policy = "deny"
provision = "copy_if_missing"
