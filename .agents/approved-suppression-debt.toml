# Human-approved suppression debt registry.
#
# このファイルは人的承認を受けた抑制債務のレジストリです。
# 通常の実装タスクでコーディングエージェントがエントリを追加してはいけません。
# エントリは一時的な債務であり、通常の許可ではありません。
# 新規エントリには明示的な人的承認が必要です。
#
# エントリ形式:
#   [[debt]]
#   path = "iris/adapters/grpc/server.py"
#   line = 103
#   kind = "noqa"           # "noqa" | "type: ignore" | "pyright: ignore" | "typing.cast" | "object.__setattr__"
#   rule_or_error_code = "BLE001"
#   reason = "..."
#   alternative_attempted = "..."
#   expires = "2025-12-31"  # YYYY-MM-DD, この日を過ぎるとテストは失敗する
#   owner = "team"
#
# kind 値は以下のいずれか:
#   "noqa"             - # noqa コメント
#   "type: ignore"     - # type: ignore コメント
#   "pyright: ignore"  - # pyright: ignore コメント
#   "typing.cast"      - typing.cast() 呼び出し
#   "object.__setattr__" - object.__setattr__() 呼び出し

