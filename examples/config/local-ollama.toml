# Iris local Ollama runtime config example.
#
# Override only the values you want to change from the built-in defaults.
# Omitted fields keep the built-in defaults.
#
# Apply with:
#   uv run python -m iris.runtime.server --config examples/config/local-ollama.toml
#
# Sensitive material such as provider keys, auth tokens, and passwords
# must never be stored here. Use environment variables (or your secret
# manager) for those values.

[models.default_chat]
provider = "ollama"
model = "qwen3:8b"
temperature = 0.7
max_output_tokens = 512

[models.fast_judge]
provider = "ollama"
model = "qwen3:4b"
temperature = 0.0
max_output_tokens = 128

[models.reasoning]
provider = "ollama"
model = "deepseek-r1:8b"
temperature = 0.0
max_output_tokens = 1024

[ollama]
base_url = "http://localhost:11434"
timeout_seconds = 120.0
keep_alive = "5m"

[diagnostics]
enabled = true
timeout_seconds = 5.0
fail_fast = false
warmup_models = false
log_issues_as_warnings = true
