# Iris OpenAI runtime config example.
#
# Override only the values you want to change from the built-in defaults.
# Omitted fields keep the built-in defaults.
#
# Apply with:
#   OPENAI_API_KEY="<your key>" \
#     uv run python -m iris.runtime.server --config examples/config/openai.toml
#
# The OpenAI credential must be supplied through an environment variable,
# not TOML. Never put provider keys, auth tokens, passwords, or
# credentials in this file.

[models.default_chat]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.7
max_output_tokens = 512

[models.fast_judge]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.0
max_output_tokens = 128

[models.reasoning]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.0
max_output_tokens = 2048

[openai]
model = "gpt-5-mini"
timeout_seconds = 60.0
max_output_tokens = 1024
