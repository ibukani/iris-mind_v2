# .codex/config.toml

# Parent agent model.
# Complex design decisions, final synthesis, and implementation planning stay on GPT-5.5.
model = "gpt-5.5"
model_reasoning_effort = "high"

# Subagent control.
[agents]
# Keep this small to avoid uncontrolled fan-out and unnecessary token burn.
max_threads = 3

# Keep depth at 1 so subagents cannot recursively spawn more subagents.
max_depth = 1