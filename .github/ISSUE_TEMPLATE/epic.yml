name: Epic
description: 複数Issueを束ねる親トラッキングIssue
title: "epic: "
labels: ["epic"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Epic が所有する成果を簡潔に要約してください。
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [runtime, safety, memory, local-ai, companion-semantics, grpc, cli, control-plane, docs, tests, refactor]
    validations:
      required: true
  - type: markdown
    attributes:
      value: "## Relationship / Dependencies"
  - type: textarea
    id: parent
    attributes:
      label: Parent
      description: 上位Epic。なければ「なし」。
      placeholder: "- #40 platform readiness"
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: Depends on
      description: Epic を安全・安定して進めるための必須前提。なければ「なし」。
      placeholder: "- #88 prerequisite"
    validations:
      required: true
  - type: textarea
    id: blocks_enables
    attributes:
      label: Blocks / Enables
      description: Epic 完了で容易または安全になる将来作業。なければ「なし」。
      placeholder: "- #92 follow-up architecture"
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related
      description: 非ブロッカーの関連Issue。なければ「なし」。
      placeholder: "- #75 context"
    validations:
      required: true
  - type: textarea
    id: supersedes
    attributes:
      label: Supersedes / Superseded by
      description: 置き換えるIssue、または本Epicを置き換えるIssue。なければ「なし」。
      placeholder: "- Supersedes #60"
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景 / Context
      description: 必要性、既存Issue・PR、設計判断、問題の発生源を記載してください。
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目的 / Goal
      description: 個別タスクではなく、Epic 完了時の到達状態を記載してください。
    validations:
      required: true
  - type: textarea
    id: child_issues
    attributes:
      label: Child issues
      description: Epic が所有する子Issue。状態が追跡できるチェックリストを推奨します。
      placeholder: "- [ ] #88 local model call budget\n- [ ] #92 BackgroundJobQueue metrics"
    validations:
      required: true
  - type: textarea
    id: recommended_order
    attributes:
      label: Recommended order
      description: 子Issueの推奨実行順と並列化可能な作業を記載してください。
      placeholder: "1. #88\n2. #92（#90 と並列可）"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: スコープ / Scope
      description: このEpicが所有する境界を明示してください。
      placeholder: "- ..."
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: スコープ外 / Non-goals
      description: 関連していても、このEpicが所有しない事項を明示してください。
      placeholder: "- ..."
    validations:
      required: true
  - type: textarea
    id: implementation_targets
    attributes:
      label: 実装対象候補 / Implementation targets
      description: 変更されそうな module / package / docs / tests を記載してください。
      placeholder: "- iris/runtime/...\n- tests/...\n- docs/..."
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 受け入れ条件 / Acceptance criteria
      placeholder: "- [ ] 必須子Issueが完了\n- [ ] 運用・安全性基準を満たす"
    validations:
      required: true
  - type: textarea
    id: recommended_tests
    attributes:
      label: 推奨テスト / Test plan
      description: Epic 全体で最低限必要な統合・安全性・回帰テストを記載してください。
      placeholder: "- 統合テスト: ...\n- 安全性テスト: ..."
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: 補足、判断記録、参照資料。
