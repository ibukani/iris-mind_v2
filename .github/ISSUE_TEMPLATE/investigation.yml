name: Investigation
description: 設計調査、研究、ADR、アーキテクチャ上の問い
title: "investigate: "
labels: ["investigation"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 調査の目的を簡潔に要約してください。
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: この調査で答える具体的な問いを記載してください。
      placeholder: ローカルモデルのカスケード判定をどの境界に置くべきか？
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P0, P1, P2, P3]
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [runtime, safety, memory, local-ai, companion-semantics, grpc, cli, control-plane, docs, tests, refactor]
    validations:
      required: true
  - type: markdown
    attributes:
      value: "## Relationship / Dependencies"
  - type: textarea
    id: parent
    attributes:
      label: Parent
      description: 階層上の親Issue。なければ「なし」。
      placeholder: "- #80 Local AI architecture"
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: Depends on
      description: 調査開始・判断前に必要な必須前提。なければ「なし」。
      placeholder: "- #88 benchmark dataset"
    validations:
      required: true
  - type: textarea
    id: blocks_enables
    attributes:
      label: Blocks / Enables
      description: 調査結果により進行可能になる作業。なければ「なし」。
      placeholder: "- #92 cascade implementation"
    validations:
      required: true
  - type: textarea
    id: related
    attributes:
      label: Related
      description: 非ブロッカーの関連Issue。なければ「なし」。
      placeholder: "- #75 latency context"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: 背景、既知の制約、既存の証拠を記載してください。
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options
      description: 比較する候補。未確定の候補も含めてください。
      placeholder: "- 案A: ...\n- 案B: ..."
    validations:
      required: true
  - type: textarea
    id: decision_criteria
    attributes:
      label: Decision criteria
      description: 性能、安全性、複雑性、運用性など判断基準を記載してください。
      placeholder: "- レイテンシ\n- model call budget\n- failure isolation"
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: 実装の acceptance criteria ではなく、調査成果物を記載してください。
      placeholder: "- [ ] ADR / docs\n- [ ] 推奨案\n- [ ] 却下案と理由\n- [ ] follow-up implementation issues"
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      placeholder: "- この調査では実装しない"
    validations:
      required: true
  - type: textarea
    id: follow_up_issues
    attributes:
      label: Follow-up issues
      description: 作成済みIssue、または調査後に作成すべき実装Issue。なければ「未作成」。
      placeholder: "- #92 cascade implementation\n- 未作成: metrics work"
    validations:
      required: true
