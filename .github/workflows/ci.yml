name: CI

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    check:
        name: AI harness check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync --all-groups

            - name: Ruff lint
              run: uv run ruff check .

            - name: Ruff format
              run: uv run ruff format --check .

            - name: mypy
              run: uv run mypy iris tests scripts main.py

            - name: pyright
              run: uv run pyright .

            - name: Architecture tests
              run: uv run pytest tests/architecture -q

            - name: Tests with coverage
              run: >-
                  uv run pytest tests/
                  --cov=iris
                  --cov-branch
                  --cov-report=term-missing:skip-covered
                  --cov-report=html
                  --cov-fail-under=90
