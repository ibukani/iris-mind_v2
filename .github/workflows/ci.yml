name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/ai-coding

permissions:
  contents: read

jobs:
  check:
    name: AI harness check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run strict verification
        run: make check
