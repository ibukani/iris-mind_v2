syntax = "proto3";

package iris.api.v1;

import "google/protobuf/timestamp.proto";
import "iris/api/v1/identity.proto";
import "iris/api/v1/spaces.proto";

enum ObservationKind {
  OBSERVATION_KIND_UNSPECIFIED = 0;
  OBSERVATION_KIND_ACTOR_MESSAGE = 1;
  reserved 2, 4, 5;
  reserved "OBSERVATION_KIND_TRANSCRIPT", "OBSERVATION_KIND_AUDIENCE_MESSAGE",
      "OBSERVATION_KIND_GAME_EVENT";
  OBSERVATION_KIND_IDLE_TICK = 3;
  OBSERVATION_KIND_ACTIVITY_EVENT = 6;
  OBSERVATION_KIND_PRESENCE_SIGNAL = 7;
  OBSERVATION_KIND_USER_FEEDBACK = 8;
}

enum ActivityKind {
  ACTIVITY_KIND_UNSPECIFIED = 0;
  ACTIVITY_KIND_ACTOR_TYPING_STARTED = 1;
  ACTIVITY_KIND_ACTOR_TYPING_STOPPED = 2;
  ACTIVITY_KIND_APP_OPENED = 3;
  ACTIVITY_KIND_APP_CLOSED = 4;
  ACTIVITY_KIND_VOICE_JOINED = 5;
  ACTIVITY_KIND_VOICE_LEFT = 6;
  reserved 7;
  reserved "ACTIVITY_KIND_SPACE_MESSAGE";
  ACTIVITY_KIND_SYSTEM_INTERACTION = 8;
}

enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  PRESENCE_STATUS_UNKNOWN = 1;
  PRESENCE_STATUS_ONLINE = 2;
  PRESENCE_STATUS_OFFLINE = 3;
  PRESENCE_STATUS_AWAY = 4;
  PRESENCE_STATUS_IDLE = 5;
  PRESENCE_STATUS_DO_NOT_DISTURB = 6;
  PRESENCE_STATUS_INVISIBLE = 7;
}

enum UserFeedbackKind {
  USER_FEEDBACK_KIND_UNSPECIFIED = 0;
  USER_FEEDBACK_KIND_POSITIVE = 1;
  USER_FEEDBACK_KIND_NEGATIVE = 2;
  USER_FEEDBACK_KIND_STYLE_PREFERENCE = 3;
  USER_FEEDBACK_KIND_CORRECTION = 4;
  USER_FEEDBACK_KIND_OTHER = 5;
}

message ActorMessagePayload {
  string text = 1;
  string external_message_id = 2;
}

message IdleTickPayload {
  string reason = 1;
  double idle_seconds = 2;
}

message ActivityEventPayload {
  ActivityKind activity_kind = 1;
  string provider_event_id = 2;
  int64 provider_sequence = 3;
  // Provider-specific auxiliary details only.
  map<string, string> metadata = 10;
}

message PresenceSignalPayload {
  PresenceStatus status = 1;
  google.protobuf.Timestamp expires_at = 2;
  // Provider-specific auxiliary details only.
  map<string, string> metadata = 10;
}

message UserFeedbackPayload {
  UserFeedbackKind feedback_kind = 1;
  string text = 2;
  string target_observation_id = 3;
  string target_action_id = 4;
  string target_external_message_id = 5;
}

message ObservationContext {
  Identity actor = 1;
  // External clients should not send internal account_id or device_id.
  string account_id = 2;
  string device_id = 3;
  string space_id = 4;
  // Stable source/provider label. Should be "cli" for iris-cli_v2.
  string source = 5;
  // account_ref lets the runtime resolve a stable Iris identity.
  // provider_subject must be stable within provider; display_name is not a key.
  ExternalAccountRef account_ref = 6;
  map<string, string> metadata = 7;
  // space_ref is optional and represents interaction context.
  // provider_space_ref must be stable within provider; display_name is not a key.
  ExternalSpaceRef space_ref = 8;
}

message Observation {
  // Client-generated observation ID.
  string observation_id = 1;
  // Client-generated session ID.
  string session_id = 2;
  // Observation kind.
  // The kind must match the selected payload exactly.
  ObservationKind kind = 3;
  // Time when the client observed this event. Required by mapper.
  google.protobuf.Timestamp occurred_at = 4;
  ObservationContext context = 5;
  oneof payload {
    ActorMessagePayload actor_message = 10;
    IdleTickPayload idle_tick = 11;
    ActivityEventPayload activity_event = 12;
    PresenceSignalPayload presence_signal = 13;
    UserFeedbackPayload user_feedback = 14;
  }
}
