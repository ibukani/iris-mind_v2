syntax = "proto3";

package iris.api.v1;

import "google/protobuf/timestamp.proto";
import "iris/api/v1/identity.proto";
import "iris/api/v1/spaces.proto";

enum ObservationKind {
  OBSERVATION_KIND_UNSPECIFIED = 0;
  OBSERVATION_KIND_ACTOR_MESSAGE = 1;
  // Not currently accepted by the gRPC mapper.
  OBSERVATION_KIND_TRANSCRIPT = 2;
  OBSERVATION_KIND_IDLE_TICK = 3;
  // Not currently accepted by the gRPC mapper.
  OBSERVATION_KIND_AUDIENCE_MESSAGE = 4;
  // Not currently accepted by the gRPC mapper.
  OBSERVATION_KIND_GAME_EVENT = 5;
}

message ActorMessagePayload {
  string text = 1;
  string external_message_id = 2;
}

message IdleTickPayload {
  string reason = 1;
  double idle_seconds = 2;
}

message ObservationContext {
  Identity actor = 1;
  // External clients should not send internal account_id or device_id.
  string account_id = 2;
  string device_id = 3;
  string space_id = 4;
  // Stable source/provider label. Should be "cli" for iris-cli_v2.
  string source = 5;
  // account_ref lets the runtime resolve a stable Iris identity.
  // provider_subject must be stable within provider; display_name is not a key.
  ExternalAccountRef account_ref = 6;
  map<string, string> metadata = 7;
  // space_ref is optional and represents interaction context.
  // provider_space_ref must be stable within provider; display_name is not a key.
  ExternalSpaceRef space_ref = 8;
}

message Observation {
  // Client-generated observation ID.
  string observation_id = 1;
  // Client-generated session ID.
  string session_id = 2;
  // Observation kind.
  // OBSERVATION_KIND_ACTOR_MESSAGE and OBSERVATION_KIND_IDLE_TICK are accepted.
  ObservationKind kind = 3;
  // Time when the client observed this event. Required by mapper.
  google.protobuf.Timestamp occurred_at = 4;
  ObservationContext context = 5;
  oneof payload {
    ActorMessagePayload actor_message = 10;
    IdleTickPayload idle_tick = 11;
  }
}
