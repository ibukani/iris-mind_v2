# Iris runtime config v2.
# Omitted values use built-in policy defaults. Credentials belong in environment variables.

[config]
version = 2

[models.default_chat]
provider = "fake"
model = "fake-llm"

[prompt_budget]
enabled = true
chat_profile = "local_balanced"
proactive_profile = "proactive_short"

[companion_semantics]
persona_prompt_enabled = false

[model_call_budget]
enabled = true
