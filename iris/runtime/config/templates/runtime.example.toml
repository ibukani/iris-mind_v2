# Iris full runtime config example.
# This file is a complete editable runtime config sample.
# It is not a pure dump of built-in defaults.
# Omitted fields in partial configs fall back to built-in defaults.
# Provider credentials must be supplied by environment variables or an
# external credential manager. Do not add tokens or passwords here.

[config]
version = 1

[server]
host = "127.0.0.1"
port = 50051
local_only = true
shutdown_grace_seconds = 5.0

[server.tls]
enabled = false
cert_chain_path = ""
# private_key_path = ""
client_ca_path = ""
require_client_cert = false

[auth]
mode = "local_dev"
allow_unauthenticated_loopback = true
# (非推奨) remote bind では TLS が常に要求されます。
require_tls_for_remote = true
allow_insecure_remote = false

[state]
backend = "memory"
sqlite_path = ".iris/runtime/state.sqlite3"

[memory.vector]
enabled = false
backend = "in_memory"
collection = "iris_memory"
rebuild_on_startup = true
fail_open_on_index_error = true

[memory.embedding]
provider = "fake"
model = "fake-v1"
dimension = 32
batch_size = 32

[memory.vector.qdrant]
url = "http://localhost:6333"
prefer_grpc = false

[scheduler]
enabled = false
interval_seconds = 30.0
idle_threshold_seconds = 600.0
min_interval_per_target_seconds = 1800.0
target_stale_after_seconds = 604800.0
max_due_per_run = 10

[conversation]
max_window_records = 20
max_history_chars = 8000
summary_enabled = true
summary_max_chars = 1600
summary_min_records = 12

[conversation.transcript]
# raw transcript persistence is opt-in and requires state.backend = "sqlite".
# Keep disabled unless retention is intentional.
enabled = false
retention_days = 30
max_records_per_key = 1000

[delivery]
enabled = true
max_outbox_depth_per_provider = 100
lease_seconds = 30.0
max_attempts = 3
retry_backoff_seconds = 30.0
rate_limit_window_seconds = 1800.0

[learning]
enabled = true
background_jobs_enabled = true
background_job_interval_seconds = 10.0
max_jobs_per_run = 5
max_attempts = 3
implicit_candidates_enabled = true
implicit_candidate_min_confidence = 0.35
implicit_candidate_max_text_length = 1000

[learning.background_job_policy]
enabled = true
default_concurrency_limit = 1
default_timeout_seconds = 30.0
default_max_pending_jobs = 100
retry_backoff_base_seconds = 30.0
retry_backoff_max_seconds = 1800.0
defer_seconds_when_saturated = 30.0
backpressure_mode = "defer"

[learning.background_job_policy.kinds.memory_extraction]
concurrency_limit = 1
timeout_seconds = 30.0
max_pending_jobs = 100
uses_llm = true
idle_only = false

[learning.background_job_policy.kinds.reflection]
concurrency_limit = 1
timeout_seconds = 60.0
max_pending_jobs = 50
uses_llm = true
idle_only = true

[model_call_budget]
enabled = true

[model_call_budget.user_response_hot_path]
large_llm_max_calls = 1
small_classifier_max_calls = 1
embedding_max_calls = 1
reranker_max_calls = 1
background_llm_max_calls = 0
confidence_threshold = 0.65
low_confidence_fallback = "deterministic_baseline"
high_risk_escalation_allowed = true
uncertain_escalation_allowed = true
enqueue_only = false

[model_call_budget.proactive]
large_llm_max_calls = 1
small_classifier_max_calls = 1
embedding_max_calls = 1
reranker_max_calls = 0
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "defer"
high_risk_escalation_allowed = true
uncertain_escalation_allowed = true
enqueue_only = false

[model_call_budget.memory_extraction]
large_llm_max_calls = 0
small_classifier_max_calls = 1
embedding_max_calls = 1
reranker_max_calls = 0
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "enqueue_background"
high_risk_escalation_allowed = false
uncertain_escalation_allowed = false
enqueue_only = false

[model_call_budget.reflection]
large_llm_max_calls = 0
small_classifier_max_calls = 0
embedding_max_calls = 1
reranker_max_calls = 0
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "defer"
high_risk_escalation_allowed = false
uncertain_escalation_allowed = false
enqueue_only = false

[model_call_budget.relationship_update]
large_llm_max_calls = 0
small_classifier_max_calls = 1
embedding_max_calls = 1
reranker_max_calls = 0
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "no_op"
high_risk_escalation_allowed = false
uncertain_escalation_allowed = false
enqueue_only = false

[model_call_budget.interaction_policy_candidate]
large_llm_max_calls = 0
small_classifier_max_calls = 1
embedding_max_calls = 1
reranker_max_calls = 1
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "reject"
high_risk_escalation_allowed = false
uncertain_escalation_allowed = false
enqueue_only = false

[model_call_budget.runtime_learning_hook]
large_llm_max_calls = 0
small_classifier_max_calls = 0
embedding_max_calls = 0
reranker_max_calls = 0
background_llm_max_calls = 1
confidence_threshold = 0.65
low_confidence_fallback = "enqueue_background"
high_risk_escalation_allowed = false
uncertain_escalation_allowed = false
enqueue_only = true

[delivery.quiet_hours]
enabled = false
start = "22:00"
end = "08:00"
timezone = "Asia/Tokyo"

[models.default_chat]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 512

[models.fast_judge]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 128

[models.reasoning]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 1024

[ollama]
base_url = "http://localhost:11434"
timeout_seconds = 120.0
keep_alive = "5m"
think = false

[openai]
model = "gpt-5-mini"
timeout_seconds = 60.0
max_output_tokens = 512

[logging]
level = "INFO"
format = "text"
# file_path is omitted by default. Set it to a path to enable file logging.
rotation = "10 MB"
retention = "7 days"

[safety]
# development: pass-through, basic: output checks, strict: deterministic proactive policy
mode = "development"
max_output_chars = 4000

[observability.latency_budget]
enabled = true
slow_warning_enabled = true
handle_observation_ms = 3000.0
observation_integration_ms = 50.0
workspace_context_assembly_ms = 100.0
conversation_context_load_ms = 100.0
cognitive_processing_ms = 2500.0
llm_generate_ms = 2200.0
conversation_record_ms = 100.0
transcript_append_ms = 100.0
runtime_learning_hook_ms = 200.0
background_enqueue_ms = 100.0
classifier_call_ms = 50.0
embedding_call_ms = 150.0
reranker_call_ms = 100.0

[diagnostics]
mode = "warn"
timeout_seconds = 5.0
readiness_timeout_seconds = 5.0
warmup_timeout_seconds = 120.0
warmup_models = false
