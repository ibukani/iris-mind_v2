# Iris full runtime config example.
# This file is a complete editable runtime config sample.
# It is not a pure dump of built-in defaults.
# Omitted fields in partial configs fall back to built-in defaults.
# Provider credentials must be supplied by environment variables or an
# external credential manager. Do not add tokens or passwords here.

[config]
version = 1

[server]
host = "127.0.0.1"
port = 50051
local_only = true
shutdown_grace_seconds = 5.0

[server.tls]
enabled = false
cert_chain_path = ""
# private_key_path = ""
client_ca_path = ""
require_client_cert = false

[auth]
mode = "local_dev"
allow_unauthenticated_loopback = true
# (非推奨) remote bind では TLS が常に要求されます。
require_tls_for_remote = true
allow_insecure_remote = false

[state]
backend = "memory"
sqlite_path = ".iris/runtime/state.sqlite3"

[scheduler]
enabled = false
interval_seconds = 30.0
idle_threshold_seconds = 600.0
min_interval_per_target_seconds = 1800.0
target_stale_after_seconds = 604800.0
max_due_per_run = 10

[delivery]
enabled = true
max_outbox_depth_per_provider = 100
lease_seconds = 30.0
max_attempts = 3
retry_backoff_seconds = 30.0
rate_limit_window_seconds = 1800.0

[delivery.quiet_hours]
enabled = false
start = "22:00"
end = "08:00"
timezone = "Asia/Tokyo"

[models.default_chat]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 512

[models.fast_judge]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 128

[models.reasoning]
provider = "fake"
model = "fake-llm"
temperature = 0.0
max_output_tokens = 1024

[ollama]
base_url = "http://localhost:11434"
timeout_seconds = 120.0
keep_alive = "5m"
think = false

[openai]
model = "gpt-5-mini"
timeout_seconds = 60.0
max_output_tokens = 512

[logging]
level = "INFO"
format = "text"
# file_path is omitted by default. Set it to a path to enable file logging.
rotation = "10 MB"
retention = "7 days"

[safety]
mode = "development"
max_output_chars = 4000

[diagnostics]
mode = "warn"
timeout_seconds = 5.0
readiness_timeout_seconds = 5.0
warmup_timeout_seconds = 120.0
warmup_models = false
