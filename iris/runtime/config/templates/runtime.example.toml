# Iris runtime config v2.
# Omitted values use built-in policy defaults. Credentials belong in environment variables.

[config]
version = 2

[models.default_chat]
provider = "fake"
model = "fake-llm"

[companion_semantics]
global_persona_enabled = false
global_persona_path = "persona.toml"

[prompt_budget]
enabled = true
chat_profile = "local_balanced"
proactive_profile = "proactive_short"

[model_call_budget]
enabled = true
